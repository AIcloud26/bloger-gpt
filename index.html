<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Insight Hub - Tech, Finance, AI Tools</title>
<meta name="description" content="Latest insights on AI tools, finance, tech and lifestyle">

<link rel="stylesheet" href="/assets/css/style.css">
<script src="https://cdn.tailwindcss.com"></script>
<script defer src="/assets/js/main.js"></script>

</head>

<body class="bg-gray-50" style="padding-bottom:70px">

<!-- NAV -->
<header class="bg-white shadow sticky top-0 z-50">
  <div class="max-w-6xl mx-auto flex justify-between items-center p-4">
    
    <div class="flex items-center gap-2">
      <img src="/assets/images/logo.png" class="h-8">
      <span class="font-semibold">InsightHub</span>
    </div>

    <nav class="flex gap-5 text-sm">
      <a href="#">Technology</a>
      <a href="#">Finance</a>
      <a href="#">AI Tools</a>
      <a href="#">Health</a>
    </nav>

  </div>
</header>

<!-- TOP BANNER -->
<div class="w-full flex justify-center py-2">
  <div class="w-full max-w-[728px] h-[90px] bg-gray-200 flex items-center justify-center">
    Banner Ad
  </div>
</div>

<!-- HERO -->
<section class="max-w-6xl mx-auto p-4">
  <div class="bg-white rounded-xl shadow overflow-hidden">
    <img src="https://source.unsplash.com/1200x400/?technology" class="w-full h-64 object-cover">
    <div class="p-4">
      <h1 class="hero-title">Latest Trends in AI, Finance & Tech</h1>
    </div>
  </div>
</section>

<!-- FEED -->
<section id="feed" class="max-w-6xl mx-auto grid md:grid-cols-3 gap-6 p-4"></section>

<!-- ANCHOR AD -->
<div class="anchor-ad flex items-center justify-center">
  <span onclick="this.parentElement.style.display='none'" style="position:absolute;right:10px;top:5px;cursor:pointer">✕</span>
  Anchor Ad
</div>

</body>
</html>
