<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insight Hub</title>

<style>
body { font-family: Arial; background:#f5f5f5; margin:0; }
.container { max-width:1000px; margin:auto; padding:20px; }
.grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(250px,1fr)); gap:20px; }
.card { background:#fff; padding:15px; border-radius:10px; text-decoration:none; color:#000; }
.card img { width:100%; border-radius:8px; }
.card h3 { font-size:16px; }
</style>

</head>

<body>

<div class="container">
  <h1>Insight Hub</h1>
  <div id="posts" class="grid"></div>
</div>

<script>
fetch('./data/posts.json')
  .then(res => res.json())
  .then(data => {
    const container = document.getElementById('posts');

    data.forEach(p => {
      const card = document.createElement('a');

      card.href = './posts/' + p.slug + '.html'; // ✅ 关键：相对路径
      card.className = 'card';

      card.innerHTML = `
        <img src="https://source.unsplash.com/400x200/?${p.category}">
        <h3>${p.title}</h3>
      `;

      container.appendChild(card);
    });
  });
</script>

</body>
</html>
