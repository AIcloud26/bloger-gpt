<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Insight Hub</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f5f5f5;
  margin: 0;
}

.container {
  max-width: 1100px;
  margin: auto;
  padding: 20px;
}

h1 {
  text-align: center;
  margin-bottom: 20px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 20px;
}

.card {
  background: #fff;
  border-radius: 12px;
  overflow: hidden;
  text-decoration: none;
  color: #000;
  transition: 0.2s;
}

.card:hover {
  transform: translateY(-5px);
}

.card img {
  width: 100%;
  height: 160px;
  object-fit: cover;
}

.card-content {
  padding: 12px;
}

.card h3 {
  font-size: 16px;
  margin: 0 0 8px;
}

.category {
  font-size: 12px;
  color: #888;
}
</style>

</head>

<body>

<div class="container">

  <h1>🔥 Insight Hub</h1>

  <div id="posts" class="grid"></div>

</div>

<script>

// ✅ 自动 slug（和生成脚本一致）
function slugify(text) {
  return text
    .toLowerCase()
    .trim()
    .replace(/\s+/g, '-')
    .replace(/[^\w-]/g, '');
}

// ✅ 加载文章
fetch('./data/posts.json')
  .then(res => res.json())
  .then(data => {

    const container = document.getElementById('posts');

    data.forEach(p => {

      const slug = p.slug || slugify(p.title);

      const card = document.createElement('a');

      // ✅ 关键：正确跳转路径
      card.href = './posts/' + slug + '.html';

      card.className = 'card';

      card.innerHTML = `
        <img src="https://source.unsplash.com/400x200/?${p.category}">
        <div class="card-content">
          <h3>${p.title}</h3>
          <div class="category">${p.category}</div>
        </div>
      `;

      container.appendChild(card);
    });

  })
  .catch(err => {
    console.error('加载失败:', err);
  });

</script>

</body>
</html>
