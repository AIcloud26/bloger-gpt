<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<base href="/bloger-gpt/">

<title>{{title}}</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f5f5f5;
  margin: 0;
  padding-bottom: 80px;
}
.container {
  max-width: 800px;
  margin: 40px auto;
  background: #fff;
  padding: 20px;
  border-radius: 10px;
}
h1 {
  font-size: 28px;
}
.meta {
  color: #888;
  font-size: 14px;
  margin-bottom: 15px;
}
img {
  width: 100%;
  border-radius: 10px;
  margin: 20px 0;
}
.ad {
  background: #eee;
  text-align: center;
  margin: 20px 0;
}
.banner {
  height: 90px;
  line-height: 90px;
}
.square {
  height: 250px;
  line-height: 250px;
}
.anchor {
  position: fixed;
  bottom: 0;
  width: 100%;
  height: 60px;
  background: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  border-top: 1px solid #ddd;
}
</style>

</head>

<body>

<div class="container">

  <h1>{{title}}</h1>

  <div class="meta">
    Updated {{date}} · Insight Hub
  </div>

  <!-- 顶部图片 -->
  <img src="https://source.unsplash.com/800x400/?{{keyword}}">

  <!-- Banner广告 -->
  <div class="ad banner">Banner Ad</div>

  <!-- 内容 -->
  <div>
    {{content}}
  </div>

  <!-- 中部图片 -->
  <img src="https://source.unsplash.com/800x400/?{{keyword}},business">

  <!-- 中部广告 -->
  <div class="ad square">Ad</div>

  <p>More insights about {{title}}. Stay updated with the latest trends.</p>

</div>

<!-- 底部Anchor广告 -->
<div class="anchor">
  Anchor Ad
</div>

</body>
</html>
