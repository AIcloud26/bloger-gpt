<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>{{title}}</title>

<style>
body { font-family: Arial; background:#f5f5f5; margin:0; padding-bottom:80px; }
.container { max-width:800px; margin:40px auto; background:#fff; padding:20px; border-radius:10px; }
.meta { color:#888; font-size:14px; }
img { width:100%; border-radius:10px; margin:20px 0; }
.ad { background:#eee; text-align:center; margin:20px 0; }
.banner { height:90px; line-height:90px; }
.square { height:250px; line-height:250px; }
.anchor { position:fixed; bottom:0; width:100%; height:60px; background:#fff; display:flex; align-items:center; justify-content:center; }
</style>

</head>

<body>

<div class="container">

<h1>{{title}}</h1>

<p class="meta">Updated {{date}}</p>

<img src="https://source.unsplash.com/800x400/?{{keyword}}">

<div class="ad banner">Banner Ad</div>

<div>
{{content}}
</div>

<img src="https://source.unsplash.com/800x400/?{{keyword}},business">

<div class="ad square">Ad</div>

<p>More insights about {{title}}</p>

</div>

<div class="anchor">Anchor Ad</div>

</body>
</html>
